<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var stored = localStorage.getItem('pucora-theme');
        var dark =
          stored === 'dark' ||
          (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
      })();
    </script>
    <link rel="icon" type="image/png" href="/pucora.png" />
    <link rel="apple-touch-icon" href="/pucora.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pucora — An extensible, ultra-high performance open-source API Gateway for microservices, event-driven systems, and beyond-REST connectivity." />
    <meta name="keywords" content="API Gateway, microservices, open source, high performance, REST, gRPC, GraphQL, Kafka, RabbitMQ, WebSocket, BFF, API management, Lura, event-driven" />
    <meta name="author" content="Pucora" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light dark" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pucora.in/" />
    <meta property="og:title" content="Pucora — High-Performance Open Source API Gateway" />
    <meta property="og:description" content="Pucora — An extensible, ultra-high performance open-source API Gateway for microservices, event-driven systems, and beyond-REST connectivity." />
    <meta property="og:image" content="https://pucora.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Pucora" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://pucora.in/" />
    <meta name="twitter:title" content="Pucora — High-Performance Open Source API Gateway" />
    <meta name="twitter:description" content="Pucora — An extensible, ultra-high performance open-source API Gateway for microservices, event-driven systems, and beyond-REST connectivity." />
    <meta name="twitter:image" content="https://pucora.in/og-image.png" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://pucora.in/" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <title>Pucora — High-Performance Open Source API Gateway</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
